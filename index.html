<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="https://github.com/cprec-nepal/logo/blob/main/CPREC%20Nepal.png?raw=true">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CPREC Nepal | Letter Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
    .glass-panel {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .input-field {
      width: 100%;
      padding: 12px 16px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 8px;
      color: white;
      transition: all 0.2s;
    }
    .input-field:focus { border-color: #06b6d4; outline: none; box-shadow: 0 0 0 2px rgba(6, 182, 212, 0.2); }
    
    .btn-primary {
      background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
      color: #020617;
      font-weight: 600;
      padding: 12px 24px;
      border-radius: 8px;
      width: 100%;
      transition: transform 0.1s;
    }
    .btn-primary:active { transform: scale(0.98); }
    
    .hidden { display: none; }
    .spinner {
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top: 3px solid #06b6d4;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
  <link rel="icon" type="image/png" sizes="32x32" href="https://github.com/cprec-nepal/logo/blob/main/CPREC%20Nepal.png?raw=true">
<link rel="icon" type="image/png" sizes="16x16" href="https://github.com/cprec-nepal/logo/blob/main/CPREC%20Nepal.png?raw=true">
<link rel="apple-touch-icon" href="https://github.com/cprec-nepal/logo/blob/main/CPREC%20Nepal.png?raw=true">
<body class="min-h-screen flex items-center justify-center p-4">
  
  <div class="w-full max-w-md glass-panel rounded-2xl p-8">
    <!-- Header -->
    <div class="text-center mb-8">
      <!-- CPREC LOGO UPDATE -->
      <div class="w-24 h-24 bg-white/5 rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-lg border border-white/10 overflow-hidden">
        <img src="https://github.com/cprec-nepal/logo/blob/main/CPREC%20Nepal.png?raw=true" alt="CPREC Nepal Logo" class="w-full h-full object-contain p-3">
      </div>
      <!-- END LOGO UPDATE -->
      
      <h1 class="text-2xl font-bold text-white">CPREC Nepal</h1>
      <p class="text-slate-400 text-sm mt-1">Official Letter Generator</p>
    </div>

    <!-- Form -->
    <form id="letterForm" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1">Full Name</label>
        <input type="text" id="fullName" class="input-field" placeholder="e.g. Ram Bahadur" required>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1">Email Address</label>
        <input type="email" id="email" class="input-field" placeholder="receiving@email.com" required>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1">Membership Type</label>
        <select id="memberType" class="input-field" onchange="handleTypeChange()">
          <option value="General Member">General Member</option>
          <option value="Friends and Family (FnF)">Friends and Family (FnF)</option>
          <option value="Board Member">Board Member</option>
        </select>
      </div>

      <!-- Patient Name: Always visible now -->
      <div id="patientNameField" class="fade-in">
        <label class="block text-sm font-medium text-cyan-300 mb-1">
          Patient Name <span id="patientHint" class="text-xs text-slate-400 font-normal">(Defaults to you if left blank)</span>
        </label>
        <input type="text" id="patientName" class="input-field" placeholder="Who is the patient?">
      </div>

      <!-- Dynamic Field: Board Code -->
      <div id="boardCodeField" class="hidden fade-in">
        <label class="block text-sm font-medium text-red-300 mb-1">Board Access Code</label>
        <input type="password" id="boardCode" class="input-field" placeholder="Enter access code">
      </div>

      <button type="submit" id="submitBtn" class="btn-primary flex items-center justify-center gap-2">
        <span>Submit Request</span>
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
      </button>
    </form>

    <!-- Response Message -->
    <div id="responseMessage" class="hidden mt-6 p-4 rounded-lg text-center fade-in"></div>

    <!-- Loading State -->
    <div id="loadingState" class="hidden mt-4 text-center">
      <div class="spinner mx-auto mb-2"></div>
      <p class="text-slate-400 text-sm">Processing request...</p>
    </div>
  </div>

  <script>
    // PASTE YOUR WEB APP URL HERE
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzjNGW96PFr2RgI2kg8HhlALPqxxE-zSOQLS35oze0OI9ElqDlx1iED3teKMyChYCmJ/exec";

    // Handle Dynamic Fields
    function handleTypeChange() {
      const type = document.getElementById('memberType').value;
      const codeField = document.getElementById('boardCodeField');
      const patientInput = document.getElementById('patientName');
      const patientHint = document.getElementById('patientHint');

      // Toggle Board Code
      if (type === "Board Member") {
        codeField.classList.remove('hidden');
        document.getElementById('boardCode').required = true;
      } else {
        codeField.classList.add('hidden');
        document.getElementById('boardCode').required = false;
      }

      // Update Patient Field Hint
      if (type === "Friends and Family (FnF)") {
        patientInput.placeholder = "Enter the family member's name";
        patientHint.textContent = "(Required for FnF)";
        patientInput.required = true;
      } else {
        // General Member or Board Member
        patientInput.placeholder = "Defaults to your name if left blank";
        patientHint.textContent = "(Defaults to you if left blank)";
        patientInput.required = false;
      }
    }

    document.getElementById('letterForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const btn = document.getElementById('submitBtn');
      const loading = document.getElementById('loadingState');
      const responseDiv = document.getElementById('responseMessage');
      const email = document.getElementById('email').value;

      // UI Updates
      btn.disabled = true;
      btn.classList.add('opacity-50');
      loading.classList.remove('hidden');
      responseDiv.classList.add('hidden');

      // Collect Data
      const data = {
        fullName: document.getElementById('fullName').value,
        email: email,
        memberType: document.getElementById('memberType').value,
        patientName: document.getElementById('patientName').value,
        boardCode: document.getElementById('boardCode').value,
        memberID: ""
      };

      // Submit
      fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(data)
      })
      .then(() => {
        loading.classList.add('hidden');
        responseDiv.className = "mt-6 p-4 bg-green-500/10 border border-green-500/20 rounded-lg text-center fade-in";
        responseDiv.innerHTML = `
          <div class="text-green-400 font-semibold text-lg mb-1">Request Submitted!</div>
          <p class="text-slate-300 text-sm">
            Your request is <span class="text-white font-medium">Pending Approval</span>. 
            Once approved, the letter will be emailed to <span class="text-white font-medium">${email}</span>.
          </p>
          <p class="text-xs text-slate-500 mt-2">This usually takes less than 1 hour. Please check your inbox/spam folder.</p>
        `;
        responseDiv.classList.remove('hidden');
        document.getElementById('letterForm').reset();
        handleTypeChange(); 
      })
      .catch(error => {
        console.error('Error:', error);
        loading.classList.add('hidden');
        responseDiv.className = "mt-6 p-4 bg-red-500/10 border border-red-500/20 rounded-lg text-center fade-in";
        responseDiv.innerHTML = `
          <div class="text-red-400 font-semibold text-lg mb-1">Network Error</div>
          <p class="text-slate-300 text-sm">Could not connect to server.</p>
        `;
        responseDiv.classList.remove('hidden');
      })
      .finally(() => {
        btn.disabled = false;
        btn.classList.remove('opacity-50');
      });
    });
  </script>
</body>
</html>
